name: Validate Skill Repository

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check required files
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f skill/SKILL.md
          test -f skill/output_contract.md
          test -f skill/scientific_rubric.md
          test -f skill/citation_policy.md
          test -f skill/refusal_and_uncertainty_policy.md
          test -f schemas/errata_report.schema.json
          test -f evals/cases.jsonl
          test -f scripts/install_local.sh
          test -f scripts/make_project_template.py
          test -f scripts/validate_schema.py
          test -f scripts/lint_skill.py
          test -f scripts/run_evals.py
          test -f examples/prompt_templates/local_file_report_mode.md
          test -f examples/prompt_templates/batch_chat_mode.md
          test -f examples/prompt_templates/chapter_review_with_reference.md
          test -f examples/prompt_templates/chapter_review_without_reference.md
          test -f examples/prompt_templates/challenge_previous_judgement.md
          test -f examples/prompt_templates/single_equation_check.md
          test -f examples/project_template/README.md
          test -f examples/project_template/input/.gitkeep
          test -f examples/project_template/reports/.gitkeep
          test -f scripts/lint_markdown.py
          test -f templates/processing_notes.template.md
          test -f examples/synthetic_textbook/chapter_01.md
          test -f examples/expected_output/synthetic_chapter_01_errata.md
          test -f examples/expected_output/synthetic_chapter_01_errata.json
          test -f scripts/validate_examples.py

      - name: Check helper scripts
        run: |
          bash -n scripts/install_local.sh
          python scripts/make_project_template.py /tmp/proofreading-project-test
          test -d /tmp/proofreading-project-test/input
          test -d /tmp/proofreading-project-test/reports
          test -f /tmp/proofreading-project-test/README.md

      - name: Run repository checks
        run: |
          python scripts/validate_schema.py
          python scripts/lint_skill.py
          python scripts/run_evals.py
          python scripts/lint_markdown.py
          python scripts/validate_examples.py
