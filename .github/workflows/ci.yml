name: Validate Skill Repository

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f skill/SKILL.md
          test -f skill/output_contract.md
          test -f skill/scientific_rubric.md
          test -f skill/citation_policy.md
          test -f skill/refusal_and_uncertainty_policy.md
          test -f schemas/errata_report.schema.json
          test -f evals/cases.jsonl

      - name: Check SKILL.md metadata
        run: |
          grep -q "^---" skill/SKILL.md
          grep -q "^name:" skill/SKILL.md
          grep -q "^description:" skill/SKILL.md
